<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Me</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:linear-gradient(
        -45deg,
        #05161a,
        #072e33,
        #0c7078,
        #0f989c
    );

    background-size:400% 400%;
    animation:bgMove 12s ease infinite;

    padding:20px;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.contact-card{

    width:100%;
    max-width:500px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:25px;

    padding:35px;

    box-shadow:
    0 0 20px rgba(0,255,255,.15),
    0 0 50px rgba(0,255,255,.1);

    animation:fadeUp 1s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.profile{

    width:100px;
    height:100px;

    border-radius:50%;
    object-fit:cover;

    display:block;
    margin:auto;

    border:3px solid #00ffff;

    box-shadow:
    0 0 15px #00ffff,
    0 0 30px #00ffff;

    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

h1{
    text-align:center;
    margin-top:20px;
    margin-bottom:10px;
    color:white;
}

.subtitle{
    text-align:center;
    color:#d8ffff;
    margin-bottom:25px;
}

.contact-list{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.contact-item{

    display:flex;
    align-items:center;
    gap:15px;

    padding:15px;

    border-radius:15px;

    background:rgba(255,255,255,.05);

    transition:.4s;
}

.contact-item:hover{
    transform:translateX(8px);

    background:rgba(255,255,255,.12);
}

.contact-item img{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
}

.contact-item a{
    text-decoration:none;
    color:white;
    font-weight:500;
    word-break:break-word;
}

.contact-item a:hover{
    color:#00ffff;
}

.home-btn{

    margin-top:30px;

    text-decoration:none;

    background:#0f989c;

    color:white;

    padding:14px 30px;

    border-radius:50px;

    font-weight:600;

    transition:.4s;
}

.home-btn:hover{

    transform:translateY(-5px);

    box-shadow:
    0 0 20px #0f989c,
    0 0 50px #0f989c;
}

footer{
    margin-top:20px;
    color:#d8ffff;
    text-align:center;
}

</style>
</head>
<body>

<div class="contact-card">

    <img src="image.png" alt="Profile" class="profile">

    <h1>Connect With Me</h1>

    <p class="subtitle">
        Let's connect and build amazing projects together.
    </p>

    <div class="contact-list">

        <div class="contact-item">

            <a href="https://x.com/TEABOY71?t=q2FvRq-xbcR-slpv1clRQQ&s=09" target="_blank">
                Twitter / X
            </a>
        </div>

        <div class="contact-item">
            <img src="whatsapp.JPG" alt="WhatsApp">
            <a href="https://wa.me/2348102758144" target="_blank">
                WhatsApp: +234 810 275 8144
            </a>
        </div>

        <div class="contact-item">
            <img src="gmail.JPG" alt="Email">
            <a href="mailto:mabubakariliya@gmail.com">
                mabubakariliya@gmail.com
            </a>
        </div>

        <div class="contact-item">
            <img src="in.png" alt="LinkedIn">
            <a href="https://www.linkedin.com/in/mustapha-abubakar-iliyasu-54a08a219"
               target="_blank">
                LinkedIn Profile
            </a>
        </div>

        <div class="contact-item">

               target="_blank">

    </div>

</div>

</body>
</html>
